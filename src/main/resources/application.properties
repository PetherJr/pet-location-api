# PositionStack Configuration
positionstack.api.key=${POSITIONSTACK_API_KEY:dummy-key}
positionstack.api.url=http://api.positionstack.com/v1/reverse

# Micrometer/Actuator Configuration
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=pet-location-api

# JPA/H2 Configuration
spring.datasource.url=jdbc:h2:mem:petlocationdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
